# Inserts a blank line between shell prompts
add_newline = true

# Timeout
command_timeout = 10000

# Use custom format
format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖвқҜ](purple)
[в”Ӯ](purple)$directory$git_branch$git_metrics$git_status$nodejs 
[в””в”ҖвқҜ ](purple)\
"""
right_format = """
$time\
"""

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold #87A752"


[directory]
truncation_length = 10
truncate_to_repo = true 
style = "bold #B3E0E7"
read_only = " ro"
truncation_symbol = "вҖҰ/"

[git_branch]
format = '\[[$symbol$branch]($style)\]'
symbol = "пҗҳ "

[git_metrics]
added_style = "bold blue"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
#conflicted = "рҹҸі"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
up_to_date = "вң“"
#untracked = "рҹӨ·"
#stashed = "рҹ“Ұ"
#modified = "рҹ“қ"
staged = '[++\($count\)](bold green)'
#renamed = "рҹ‘…"
#deleted = "рҹ—‘"

#[username]
#style_user = "white bold"
#style_root = "black bold"
#format = "user: [$user]($style) "
#disabled = false
#show_always = true

[time]
disabled = false
format = '[\[ $time \]](purple) '
time_format = "%T"
# Wait 10 milliseconds for starship to check files under the current directory.
#scan_timeout = 30
#add_newline = false

[nodejs]
format = '\[[$symbol($version)]($style)\]'

# Replace the "вқҜ" symbol in the prompt with "вһң"
#[character] # The name of the module we are configuring is "character"
#success_symbol = "[вқҜ](purple)" # The "success_symbol" segment is being set to "вһң" with the color "bold green"
